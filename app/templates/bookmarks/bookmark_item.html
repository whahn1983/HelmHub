<article class="bookmark-card {% if bookmark.pinned %}bookmark-pinned{% endif %}" id="bookmark-{{ bookmark.id }}" aria-labelledby="bookmark-title-{{ bookmark.id }}">
  {% if bookmark.pinned %}
    <div class="bookmark-pin-indicator" aria-label="Pinned" title="Pinned">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor" aria-hidden="true">
        <path d="M10.5 1.5L9.5 5 11 6.5l-2.5 2.5L7 7.5l-3.5 3.5L3 11.5l-1-1 .5-.5L6 6.5 4.5 5l2.5-2 1.5 1L10.5 1.5z"/>
      </svg>
    </div>
  {% endif %}

  <div class="bookmark-card-content">
    <a href="{{ bookmark.url }}" target="_blank" rel="noopener noreferrer" class="bookmark-title-link" id="bookmark-title-{{ bookmark.id }}">
      <span class="bookmark-favicon" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.25"/>
          <path d="M7 1.5C5.5 3 4.5 5 4.5 7s1 4 2.5 5.5M7 1.5C8.5 3 9.5 5 9.5 7s-1 4-2.5 5.5M1.5 7h11" stroke="currentColor" stroke-width="1.25"/>
        </svg>
      </span>
      {{ bookmark.title }}
      <svg class="bookmark-ext-icon" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
        <path d="M5 2H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V7M7 1h4v4M11 1L5.5 6.5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <span class="bookmark-url">{{ bookmark.display_url }}</span>
    {% if bookmark.description %}
      <p class="bookmark-description">{{ bookmark.description | truncate(120) }}</p>
    {% endif %}
  </div>

  <div class="bookmark-card-footer">
    {% if bookmark.category %}
      <span class="tag-badge">{{ bookmark.category }}</span>
    {% endif %}
    <span class="bookmark-date">{{ bookmark.created_at | format_date }}</span>
  </div>

  <div class="bookmark-card-actions">
    <!-- Pin/Unpin -->
    <button
      hx-post="/bookmarks/{{ bookmark.id }}/pin"
      hx-target="#bookmark-{{ bookmark.id }}"
      hx-swap="outerHTML"
      hx-include="[name=csrf_token]"
      class="btn-icon"
      aria-label="{{ 'Unpin bookmark' if bookmark.pinned else 'Pin bookmark' }}"
      title="{{ 'Unpin' if bookmark.pinned else 'Pin' }}"
    >
      <svg width="16" height="16" viewBox="0 0 16 16" fill="{{ 'currentColor' if bookmark.pinned else 'none' }}" aria-hidden="true">
        <path d="M12 2L10.5 6l2 2-3 3-2-2-4 4-.75.75-.75-.75.75-.75 4-4-2-2 3-3 2 2L12 2z" stroke="currentColor" stroke-width="1.25"/>
      </svg>
    </button>
    <!-- Edit -->
    <a
      href="/bookmarks/{{ bookmark.id }}/edit"
      class="btn-icon"
      aria-label="Edit bookmark"
      title="Edit"
    >
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M11.5 2.5l2 2L5 13H3v-2l8.5-8.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <!-- Delete -->
    <button
      hx-post="/bookmarks/{{ bookmark.id }}/delete"
      hx-target="#bookmark-{{ bookmark.id }}"
      hx-swap="outerHTML"
      hx-confirm="Delete this bookmark?"
      hx-include="[name=csrf_token]"
      class="btn-icon btn-danger"
      aria-label="Delete bookmark"
      title="Delete"
    >
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M3.5 4.5h9M6 4.5V3h4v1.5M7 7v4M9 7v4M4.5 4.5l.5 8h6l.5-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</article>
