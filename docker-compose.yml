version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: helmhub
      POSTGRES_USER: helmhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helmhub_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helmhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8000"
    environment:
      DATABASE_URL: postgresql://helmhub:${POSTGRES_PASSWORD:-helmhub_secret}@db:5432/helmhub
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FLASK_ENV: production
      TZ: ${TZ:-UTC}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-changeme}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_data:/app/data

volumes:
  postgres_data:
  app_data:
