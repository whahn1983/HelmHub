services:
  db:
    image: postgres:16-alpine
    container_name: helmhub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: helmhub
      POSTGRES_USER: helmhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helmhub_secret}
    volumes:
      # Set DB_DATA_PATH to an absolute local server path, e.g. /srv/helmhub/postgres
      - ${DB_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helmhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    image: whahn1983/helmhub:latest
    container_name: helmhub-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8000"
    environment:
      DATABASE_URL: postgresql://helmhub:${POSTGRES_PASSWORD:-helmhub_secret}@db:5432/helmhub
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:-replace-with-fernet-key}
      FLASK_ENV: production
      TZ: ${TZ:-UTC}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-changeme}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Set APP_DATA_PATH to an absolute local server path, e.g. /srv/helmhub/app
      - ${APP_DATA_PATH:-./data/app}:/app/data
